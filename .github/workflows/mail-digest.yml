name: Mail digest

on:
  schedule:
    # Primary: 00:30 UTC = 06:00 IST. Off-round minute avoids GitHub's
    # top-of-hour cron congestion.
    - cron: '30 0 * * *'
    # Backup: 01:37 UTC = 07:07 IST. GitHub delays or drops schedule
    # events under load (fleet lesson from 2026-07-04). The guard step skips
    # this run when the primary already handled today, so it only delivers
    # when the primary was dropped — or failed, making it a retry too.
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Set to "scheduler" by fleet-scheduler; leave empty for manual runs'
        default: ''
        required: false

permissions:
  contents: write  # the run commits its state back here
  actions: read  # guard step lists today's runs

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip if an earlier run already handled this edition
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_SOURCE: ${{ inputs.source || '' }}
        run: |
          # Truly-manual runs always proceed; cron runs and scheduler
          # dispatches (source=scheduler) dedupe against each other.
          # Window is 3 hours, NOT today: that pairs each backup with its
          # own edition while letting the 19:00 evening sweep run after a
          # successful morning digest. Fails open — a broken check must
          # never cost a digest.
          if [ "$GITHUB_EVENT_NAME" != "schedule" ] && [ "$DISPATCH_SOURCE" != "scheduler" ]; then
            exit 0
          fi
          since=$(date -u -d '3 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          count=$(RUN_ID="$GITHUB_RUN_ID" gh api -X GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/mail-digest.yml/runs" \
            -f created=">=$since" \
            --jq '[.workflow_runs[]
                   | select(.event == "schedule" or .event == "workflow_dispatch")
                   | select(.id != (env.RUN_ID|tonumber))
                   | select(.status == "queued" or .status == "in_progress"
                            or .conclusion == "success")] | length') || count=0
          case "$count" in ''|*[!0-9]*) count=0;; esac
          if [ "$count" -gt 0 ]; then
            echo "An earlier scheduled run already handled today — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-python@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Restore Gmail OAuth files
        if: steps.guard.outputs.skip != 'true'
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Run agent
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIP_SENDERS: ${{ secrets.VIP_SENDERS }}
        run: python mail_digest.py



      - name: Persist state
        if: steps.guard.outputs.skip != 'true'
        run: |
          # Best-effort: losing state costs tomorrow's context, never
          # today's message (which already went out).
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Update agent state"
            git pull --rebase -q origin main || true
            git push || echo "state push failed (non-fatal)"
          fi

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # The 22:15 watchdog only notices tonight — this pings the moment
          # a run dies, from this agent's own bot, with a link to the log.
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            --data-urlencode text="⚠️ $GITHUB_WORKFLOW: run failed — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null
